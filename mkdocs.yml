site_name: querydsl-ktx
site_url: https://harryjhin.github.io/querydsl-ktx/
site_description: Null-safe infix Kotlin extensions for QueryDSL dynamic queries
site_author: Jinhyun Ju

repo_name: HarryJhin/querydsl-ktx
repo_url: https://github.com/HarryJhin/querydsl-ktx

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HarryJhin/querydsl-ktx

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Why: why.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - User Guide:
    - Dynamic Queries: guide/dynamic-queries.md
    - Extensions: guide/extensions.md
    - Pagination: guide/pagination.md
    - Bulk DML: guide/bulk-dml.md
  - API Reference: https://harryjhin.github.io/querydsl-ktx/api/
