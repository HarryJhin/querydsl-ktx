name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
    tags-ignore:
      - 'v*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
        spring-boot: ['3.0.13', '3.2.12', '3.3.8', '3.4.4']
    name: Build (Java ${{ matrix.java }}, Spring Boot ${{ matrix.spring-boot }})
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/wrapper-validation@v4

      - name: Build & Test
        run: ./gradlew build -PspringBootVersion=${{ matrix.spring-boot }}

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-java${{ matrix.java }}-sb${{ matrix.spring-boot }}
          path: '**/build/reports/tests/'

      - name: Cleanup Gradle Cache
        run: |
          rm -f ~/.gradle/caches/modules-2/modules-2.lock
          rm -f ~/.gradle/caches/modules-2/gc.properties

  build-openfeign:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
        querydsl-version: ['6.12']
    name: Build (Java ${{ matrix.java }}, OpenFeign QueryDSL ${{ matrix.querydsl-version }})
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: gradle

      - uses: gradle/actions/wrapper-validation@v4

      - name: Build & Test
        run: >-
          ./gradlew build
          -PquerydslGroupId=io.github.openfeign.querydsl
          -PquerydslVersion=${{ matrix.querydsl-version }}

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-java${{ matrix.java }}-openfeign${{ matrix.querydsl-version }}
          path: '**/build/reports/tests/'

      - name: Cleanup Gradle Cache
        run: |
          rm -f ~/.gradle/caches/modules-2/modules-2.lock
          rm -f ~/.gradle/caches/modules-2/gc.properties
