name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'querydsl-ktx/src/main/kotlin/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate Dokka API docs
        run: ./gradlew dokkaHtmlMultiModule

      - name: Copy Dokka into VitePress public
        run: cp -r build/dokka/htmlMultiModule docs/public/api

      - name: Copy llms.txt into VitePress public
        run: cp llms.txt llms-full.txt docs/public/

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

      - name: Cleanup Gradle Cache
        run: |
          rm -f ~/.gradle/caches/modules-2/modules-2.lock
          rm -f ~/.gradle/caches/modules-2/gc.properties

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
