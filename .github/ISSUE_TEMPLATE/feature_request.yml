name: Feature Request
description: Suggest a new feature for querydsl-ktx
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature.
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem does this solve? Show the QueryDSL code you're writing today.
      render: kotlin
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: How would you like to use this feature?
      render: kotlin
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or considered.
